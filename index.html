<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choice Chats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── CSS変数 ─────────────────────────────────── */
:root {
  --c-bg:      #0e0e10;
  --c-surface: #17171a;
  --c-raised:  #1e1e22;
  --c-hover:   #26262c;
  --c-border:  #2e2e36;
  --c-text:    #f0f0f4;
  --c-sub:     #9898a8;
  --c-muted:   #5a5a6a;
  --a1: #7c6dfa; --a2: #c084fc;
  --grad: linear-gradient(135deg, var(--a1), var(--a2));
  --sidebar-w: 272px;
  --font: 'Inter','Noto Sans JP',sans-serif;
  --fz: 14px;
  --shadow: 0 8px 32px rgba(0,0,0,.5);
}
[data-theme="light"] {
  --c-bg:#f2f2f5; --c-surface:#ffffff; --c-raised:#ebebf0;
  --c-hover:#e0e0ea; --c-border:#d0d0dc;
  --c-text:#111118; --c-sub:#606070; --c-muted:#aaaabc;
}
.ac-violet { --a1:#7c6dfa; --a2:#c084fc }
.ac-ocean  { --a1:#3b82f6; --a2:#06b6d4 }
.ac-sunset { --a1:#f97316; --a2:#ec4899 }
.ac-forest { --a1:#22c55e; --a2:#14b8a6 }
.ac-rose   { --a1:#f43f5e; --a2:#f97316 }
.ac-gold   { --a1:#f59e0b; --a2:#fbbf24 }
.ac-indigo { --a1:#6366f1; --a2:#8b5cf6 }

/* ── リセット ─────────────────────────────────── */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box }
html,body { height:100%; overflow:hidden }
body {
  font-family:var(--font); font-size:var(--fz); color:var(--c-text);
  background:var(--c-bg); display:flex; transition:background .25s,color .25s;
}
body.has-bg { background:none }
button,input,textarea,select { font-family:inherit; font-size:inherit }
button { cursor:pointer; border:none; background:none }
input,textarea { border:none; outline:none }

/* ── 背景 ─────────────────────────────────────── */
#bg {
  position:fixed; inset:0; z-index:0;
  background-size:cover; background-position:center;
  transition:background-image .4s;
}
#bg::after {
  content:''; position:absolute; inset:0;
  background:rgba(0,0,0,.52);
}
[data-theme="light"] #bg::after { background:rgba(255,255,255,.38) }

/* ── サイドバー ─────────────────────────────────── */
#sb {
  width:var(--sidebar-w); flex-shrink:0; height:100vh;
  display:flex; flex-direction:column;
  background:var(--c-surface); border-right:1px solid var(--c-border);
  position:relative; z-index:20; transition:background .25s;
}
body.has-bg #sb { background:rgba(11,11,15,.84); backdrop-filter:blur(20px) }
[data-theme="light"] body.has-bg #sb { background:rgba(255,255,255,.84); backdrop-filter:blur(20px) }

/* ブランドヘッダー */
.sb-head { padding:16px 14px 10px; flex-shrink:0 }
.brand { display:flex; align-items:center; gap:10px; margin-bottom:12px }
.brand-logo {
  width:36px; height:36px; border-radius:10px; flex-shrink:0;
  background:var(--grad); display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 14px rgba(124,109,250,.45);
}
.brand-name {
  font-family:'Orbitron',monospace; font-size:14.5px; font-weight:900;
  background:var(--grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:.4px;
}
.brand-sub { font-size:8px; letter-spacing:2.5px; color:var(--c-muted); margin-top:3px }
.tmp-btn {
  display:flex; align-items:center; gap:8px;
  width:100%; padding:8px 12px; border-radius:9px;
  border:1px solid var(--c-border); color:var(--c-text); background:var(--c-raised);
  font-size:13px; transition:background .15s,border-color .15s;
}
.tmp-btn:hover { background:var(--c-hover); border-color:var(--c-sub) }
.tmp-badge {
  margin-left:auto; font-size:9px; letter-spacing:1px; color:var(--c-muted);
  background:var(--c-hover); padding:1px 5px; border-radius:4px; font-family:monospace;
}

/* 時計 */
.clock-box { padding:10px 14px 8px; border-bottom:1px solid var(--c-border); flex-shrink:0 }
.clock-city { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--c-muted) }
.clock-time {
  font-family:'Orbitron',monospace; font-size:25px; font-weight:800;
  background:var(--grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text; line-height:1.2; margin-top:2px;
}
.clock-date { font-size:11px; color:var(--c-sub); margin-top:2px }

/* スクロール領域 */
.sb-scroll { flex:1; overflow-y:auto; overflow-x:hidden }
.sb-scroll::-webkit-scrollbar { width:3px }
.sb-scroll::-webkit-scrollbar-thumb { background:var(--c-border); border-radius:3px }

/* セクションラベル */
.sec-lbl {
  padding:10px 14px 4px; font-size:9px; font-weight:700;
  text-transform:uppercase; letter-spacing:2px; color:var(--c-muted);
}

/* モデルピン */
.model-pins { padding:0 8px 4px }
.model-pin {
  display:flex; align-items:center; gap:9px;
  padding:7px 8px; border-radius:9px; cursor:pointer;
  transition:background .12s; position:relative;
}
.model-pin:hover { background:var(--c-hover) }
.model-pin.active { background:var(--c-hover) }
.model-pin.active::before {
  content:''; position:absolute; left:0; top:22%; bottom:22%;
  width:3px; border-radius:3px; background:var(--grad);
}
.pin-ico {
  width:24px; height:24px; border-radius:6px; flex-shrink:0;
  background:var(--c-raised); overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.pin-ico img { width:16px; height:16px; object-fit:contain }
.pin-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.pin-prov { font-size:10px; color:var(--c-muted) }
.pin-check {
  width:14px; height:14px; border-radius:50%; background:var(--grad);
  flex-shrink:0; display:none; align-items:center; justify-content:center;
}
.model-pin.active .pin-check { display:flex }

/* New Chats */
.new-wrap { padding:8px 10px }
.new-btn {
  display:flex; align-items:center; justify-content:center; gap:7px;
  width:100%; padding:10px; border-radius:11px; background:var(--grad);
  color:#fff; font-size:13px; font-weight:700; letter-spacing:.3px;
  box-shadow:0 2px 16px rgba(124,109,250,.38);
  transition:opacity .2s,transform .1s,box-shadow .2s;
}
.new-btn:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 4px 24px rgba(124,109,250,.52) }
.new-btn:active { transform:translateY(0) }

/* 履歴 */
.hist { padding:2px 8px 8px }
.hist-item {
  display:flex; align-items:center; gap:7px;
  padding:7px 8px; border-radius:9px; cursor:pointer;
  transition:background .12s; position:relative;
}
.hist-item:hover { background:var(--c-hover) }
.hist-item.active { background:var(--c-raised) }
.hist-ico { color:var(--c-muted); flex-shrink:0 }
.hist-name {
  flex:1; font-size:12.5px; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.hist-name input {
  width:100%; background:transparent; color:var(--c-text);
  font-size:12.5px; border-bottom:1px solid var(--a1);
}
.hist-acts { display:none; gap:2px; flex-shrink:0 }
.hist-item:hover .hist-acts { display:flex }
.ha-btn {
  display:flex; align-items:center; padding:3px; border-radius:5px;
  color:var(--c-muted); transition:color .12s,background .12s;
}
.ha-btn:hover { color:var(--c-text); background:var(--c-raised) }
.ha-del:hover { color:#f87171 }

/* フッター */
.sb-foot {
  display:flex; align-items:center; gap:6px; padding:10px 12px;
  border-top:1px solid var(--c-border); background:var(--c-surface); flex-shrink:0;
}
body.has-bg .sb-foot { background:transparent }
.icon-btn {
  display:flex; align-items:center; justify-content:center;
  padding:8px; border-radius:9px; color:var(--c-sub);
  transition:background .12s,color .12s; flex-shrink:0;
}
.icon-btn:hover { background:var(--c-hover); color:var(--c-text) }
.acct-btn {
  display:flex; align-items:center; gap:9px; flex:1; min-width:0;
  padding:6px 8px; border-radius:9px; color:var(--c-text); transition:background .12s;
}
.acct-btn:hover { background:var(--c-hover) }
.acct-av {
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  background:var(--grad); overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:#fff;
}
.acct-av img { width:100%; height:100%; object-fit:cover }
.acct-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:110px }
.acct-sub  { font-size:10px; color:var(--c-muted) }

/* ── メインエリア ────────────────────────────── */
#main {
  flex:1; display:flex; flex-direction:column;
  height:100vh; overflow:hidden; position:relative; z-index:10;
}

/* トップバー */
.topbar {
  display:flex; align-items:center; gap:12px; padding:11px 20px;
  border-bottom:1px solid var(--c-border); background:var(--c-surface);
  flex-shrink:0; backdrop-filter:blur(16px);
}
body.has-bg .topbar { background:rgba(11,11,15,.74) }
[data-theme="light"] body.has-bg .topbar { background:rgba(255,255,255,.74) }

/* モデルセレクター */
.model-sel-wrap { position:relative }
.model-sel-btn {
  display:flex; align-items:center; gap:8px; padding:7px 12px; border-radius:9px;
  border:1px solid var(--c-border); background:var(--c-raised);
  color:var(--c-text); font-size:13px; font-weight:500; transition:background .12s;
}
.model-sel-btn:hover { background:var(--c-hover) }
.model-sel-btn img { width:18px; height:18px; border-radius:5px }

.model-dd {
  display:none; position:absolute; top:calc(100% + 5px); left:0;
  min-width:270px; max-height:420px; overflow-y:auto;
  background:var(--c-surface); border:1px solid var(--c-border);
  border-radius:13px; padding:6px; z-index:200; box-shadow:var(--shadow);
}
.model-dd.open { display:block }
.model-dd::-webkit-scrollbar { width:4px }
.model-dd::-webkit-scrollbar-thumb { background:var(--c-border) }
.dd-cat {
  padding:6px 8px 3px; font-size:9px; font-weight:700;
  text-transform:uppercase; letter-spacing:2px; color:var(--c-muted);
}
.dd-item {
  display:flex; align-items:center; gap:9px;
  padding:8px; border-radius:8px; cursor:pointer; transition:background .12s;
}
.dd-item:hover { background:var(--c-hover) }
.dd-item.active { background:var(--c-raised) }
.dd-item img { width:20px; height:20px; border-radius:5px }
.dd-name { font-size:13px; font-weight:500 }
.dd-prov { font-size:10px; color:var(--c-muted) }

.topbar-info { flex:1; min-width:0 }
.topbar-info h2 { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.topbar-info p  { font-size:11px; color:var(--c-muted) }

/* メッセージ */
.msgs {
  flex:1; overflow-y:auto; padding:24px 20px 12px;
  display:flex; flex-direction:column; gap:20px;
}
.msgs::-webkit-scrollbar { width:4px }
.msgs::-webkit-scrollbar-thumb { background:var(--c-border); border-radius:4px }

/* ウェルカム */
.welcome {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100%; gap:16px; text-align:center;
}
.wlc-logo {
  width:72px; height:72px; border-radius:20px; background:var(--grad);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 32px rgba(124,109,250,.45);
}
.wlc-title {
  font-family:'Orbitron',monospace; font-size:26px; font-weight:900;
  background:var(--grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
}
.wlc-sub { font-size:13px; color:var(--c-sub); line-height:1.75; max-width:360px }
.wlc-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:520px }
.chip {
  display:flex; align-items:center; gap:6px; padding:5px 11px; border-radius:20px;
  border:1px solid var(--c-border); background:var(--c-raised);
  font-size:12px; cursor:pointer; transition:border-color .15s,background .15s;
}
.chip:hover { background:var(--c-hover); border-color:var(--a1) }
.chip img { width:14px; height:14px; border-radius:3px }

/* メッセージバブル */
.msg-row { display:flex; gap:12px; max-width:820px; margin:0 auto; width:100% }
.msg-row.user { flex-direction:row-reverse }
.msg-av {
  width:32px; height:32px; border-radius:50%; flex-shrink:0; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700;
}
.msg-row.user .msg-av { background:var(--grad); color:#fff }
.msg-row.ai   .msg-av { background:var(--c-raised); border:1px solid var(--c-border) }
.msg-row.ai   .msg-av img { width:18px; height:18px; border-radius:4px }
.msg-bub {
  max-width:calc(100% - 50px); padding:12px 16px;
  border-radius:15px; font-size:var(--fz); line-height:1.75;
}
.msg-row.user .msg-bub { background:var(--grad); color:#fff; border-bottom-right-radius:4px }
.msg-row.ai   .msg-bub {
  background:var(--c-surface); border:1px solid var(--c-border);
  border-bottom-left-radius:4px; color:var(--c-text);
}
body.has-bg .msg-row.ai .msg-bub { background:rgba(18,18,22,.92) }
[data-theme="light"] body.has-bg .msg-row.ai .msg-bub { background:rgba(255,255,255,.92) }
.msg-bub p:not(:last-child) { margin-bottom:8px }
.msg-bub pre {
  background:var(--c-bg); border:1px solid var(--c-border);
  border-radius:8px; padding:12px; overflow-x:auto; margin:8px 0; font-size:12px;
}
.msg-bub code { background:rgba(124,109,250,.18); padding:1px 5px; border-radius:3px; font-size:12px }
.msg-bub pre code { background:transparent; padding:0 }
.msg-bub ul,.msg-bub ol { margin:6px 0 6px 20px }
.msg-bub h1,.msg-bub h2,.msg-bub h3 { margin:8px 0 4px }
.msg-time { font-size:10px; color:var(--c-muted); margin-top:5px }
.msg-row.ai .msg-time { text-align:left }
.msg-row.user .msg-time { text-align:right }

/* タイピングアニメーション */
.typing-row .msg-bub { padding:14px 16px }
.dot { width:7px; height:7px; border-radius:50%; background:var(--c-muted); display:inline-block; margin:0 2px; animation:bounce 1.2s infinite }
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

/* 入力エリア */
.input-area {
  padding:12px 20px 16px; border-top:1px solid var(--c-border);
  background:var(--c-surface); flex-shrink:0; backdrop-filter:blur(16px);
}
body.has-bg .input-area { background:rgba(11,11,15,.74) }
[data-theme="light"] body.has-bg .input-area { background:rgba(255,255,255,.74) }
.input-box {
  display:flex; gap:10px; align-items:flex-end;
  background:var(--c-raised); border:1px solid var(--c-border);
  border-radius:14px; padding:10px 12px;
  transition:border-color .2s,box-shadow .2s;
}
.input-box:focus-within { border-color:var(--a1); box-shadow:0 0 0 3px rgba(124,109,250,.15) }
#msg-input {
  flex:1; background:transparent; color:var(--c-text);
  font-size:14px; resize:none; max-height:200px; min-height:22px; line-height:1.55;
}
#msg-input::placeholder { color:var(--c-muted) }
.send-btn {
  width:36px; height:36px; border-radius:9px; flex-shrink:0;
  background:var(--grad); color:#fff;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .2s,transform .1s;
}
.send-btn:hover { opacity:.85; transform:scale(1.07) }
.send-btn:disabled { opacity:.35; cursor:not-allowed; transform:none }
.input-hint { text-align:center; font-size:11px; color:var(--c-muted); margin-top:6px }

/* ── パネル共通 ──────────────────────────────── */
.overlay { position:fixed; inset:0; z-index:100; display:none }
.overlay.open { display:block }
.ov-bg { position:absolute; inset:0; background:rgba(0,0,0,.45); backdrop-filter:blur(4px) }
.panel {
  position:absolute; right:0; top:0; bottom:0; width:400px; max-width:100vw;
  background:var(--c-surface); border-left:1px solid var(--c-border);
  display:flex; flex-direction:column; overflow:hidden;
  animation:slideIn .22s ease;
}
body.has-bg .panel { background:rgba(14,14,18,.96); backdrop-filter:blur(24px) }
[data-theme="light"] body.has-bg .panel { background:rgba(250,250,252,.96) }
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.panel-hdr {
  display:flex; align-items:center; gap:11px; padding:18px 20px 14px;
  border-bottom:1px solid var(--c-border); flex-shrink:0;
}
.panel-title { font-size:16px; font-weight:700; flex:1 }
.close-btn {
  width:30px; height:30px; border-radius:8px; color:var(--c-sub);
  display:flex; align-items:center; justify-content:center; font-size:16px;
  transition:background .12s,color .12s;
}
.close-btn:hover { background:var(--c-hover); color:var(--c-text) }
.panel-body { flex:1; overflow-y:auto; padding:18px 20px }
.panel-body::-webkit-scrollbar { width:4px }
.panel-body::-webkit-scrollbar-thumb { background:var(--c-border) }

/* ── 設定UI ──────────────────────────────────── */
.set-sec { margin-bottom:24px }
.set-sec-ttl {
  font-size:9.5px; font-weight:700; text-transform:uppercase;
  letter-spacing:2px; color:var(--c-muted); margin-bottom:10px;
}
.set-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 12px; background:var(--c-raised); border-radius:10px;
  border:1px solid transparent; margin-bottom:6px; transition:border-color .15s;
}
.set-row:hover { border-color:var(--c-border) }
.set-lbl { font-size:13px; font-weight:500 }
.set-sub { font-size:11px; color:var(--c-muted); margin-top:1px }
.tog {
  width:42px; height:24px; border-radius:12px; flex-shrink:0;
  background:var(--c-hover); border:1px solid var(--c-border);
  position:relative; cursor:pointer; transition:background .2s;
}
.tog.on { background:var(--grad); border-color:transparent }
.tog::after {
  content:''; position:absolute; width:18px; height:18px; border-radius:50%;
  background:#fff; top:2px; left:2px; transition:transform .2s; box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.tog.on::after { transform:translateX(18px) }

.accent-row { display:flex; gap:8px; flex-wrap:wrap; padding:2px 0 4px }
.swatch {
  width:40px; height:40px; border-radius:10px; cursor:pointer;
  border:2.5px solid transparent; transition:transform .15s,border-color .15s;
}
.swatch:hover { transform:scale(1.1) }
.swatch.on { border-color:var(--c-text); transform:scale(1.12) }

.bg-drop {
  border:2px dashed var(--c-border); border-radius:12px;
  padding:22px; text-align:center; cursor:pointer;
  transition:border-color .2s,background .2s; margin-bottom:8px; display:block;
}
.bg-drop:hover { border-color:var(--a1); background:rgba(124,109,250,.06) }
.bg-thumb-img { width:100%; height:76px; object-fit:cover; border-radius:8px; margin-top:10px; display:none }

.font-search {
  width:100%; background:var(--c-raised); border:1px solid var(--c-border);
  color:var(--c-text); padding:8px 12px; border-radius:8px;
  font-size:13px; margin-bottom:8px; transition:border-color .2s;
}
.font-search:focus { border-color:var(--a1) }
.font-list {
  height:200px; overflow-y:auto;
  background:var(--c-raised); border:1px solid var(--c-border); border-radius:8px;
}
.font-list::-webkit-scrollbar { width:4px }
.font-list::-webkit-scrollbar-thumb { background:var(--c-border) }
.font-item {
  padding:8px 12px; cursor:pointer; font-size:13px;
  border-bottom:1px solid var(--c-border); transition:background .12s;
}
.font-item:last-child { border-bottom:none }
.font-item:hover { background:var(--c-hover) }
.font-item.on { color:var(--a1); font-weight:600 }

.sz-row { display:flex; gap:6px }
.sz-btn {
  flex:1; padding:8px; border-radius:9px; background:var(--c-hover);
  border:1px solid var(--c-border); color:var(--c-sub); font-size:13px;
  transition:background .15s,color .15s,border-color .15s;
}
.sz-btn.on { background:var(--grad); border-color:transparent; color:#fff }

<!-- ━━━━━━━━━━━━ JavaScript ━━━━━━━━━━━━ -->
<script>
// ================================================
// 状態
// ================================================
var G = {
  models: [], model: null,
  chats: [], chatId: null, isTemp: false,
  user: null, token: null,
  cfg: { theme:'dark', ac:'ac-violet', bg:null, font:'Inter', sz:'medium' },
  fonts: [], fontsF: []
};

// ================================================
// 初期化
// ================================================
function init() {
  loadLS();
  applyAll(G.cfg);
  startClock();
  google.script.run
    .withSuccessHandler(function(ms) {
      G.models = ms;
      renderPins(); renderDd(); renderChips();
      if (!G.model && ms.length) setModel(ms[0]);
    })
    .getModels();
  loadFonts();
  if (G.user) { updateAcctUI(); if (G.token) loadSrvChats(); }
  newChat();
  setTimeout(function() {
    var l = document.getElementById('loading');
    l.classList.add('fade');
    setTimeout(function(){ l.style.display='none'; }, 400);
  }, 700);
}

// ================================================
// ローカルストレージ
// ================================================
function saveLS() {
  try {
    localStorage.setItem('cc_cfg',   JSON.stringify(G.cfg));
    localStorage.setItem('cc_model', JSON.stringify(G.model));
    if (G.user)  localStorage.setItem('cc_user',  JSON.stringify(G.user));
    if (G.token) localStorage.setItem('cc_token', G.token);
    if (!G.user) localStorage.setItem('cc_chats', JSON.stringify(G.chats));
  } catch(e){}
}
function loadLS() {
  try {
    var c=localStorage.getItem('cc_cfg');   if(c) G.cfg=Object.assign(G.cfg,JSON.parse(c));
    var m=localStorage.getItem('cc_model'); if(m) try{G.model=JSON.parse(m);}catch(e){}
    var u=localStorage.getItem('cc_user');  if(u) G.user=JSON.parse(u);
    var t=localStorage.getItem('cc_token'); if(t) G.token=t;
    var h=localStorage.getItem('cc_chats'); if(h) G.chats=JSON.parse(h);
  } catch(e){}
}

// ================================================
// 時計
// ================================================
function startClock() {
  function tick() {
    var n = new Date();
    document.getElementById('clock-time').textContent = pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
    var days=['日','月','火','水','木','金','土'];
    document.getElementById('clock-date').textContent = (n.getMonth()+1)+'月'+n.getDate()+'日（'+days[n.getDay()]+'）';
  }
  tick(); setInterval(tick, 1000);
  try {
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.getElementById('clock-city').textContent = tz.split('/').pop().replace(/_/g,' ');
  } catch(e){}
}
function pad(n){ return String(n).padStart(2,'0'); }

// ================================================
// モデル
// ================================================
function renderPins() {
  var c = document.getElementById('model-pins'); c.innerHTML = '';
  G.models.slice(0,9).forEach(function(m) {
    var el = document.createElement('div');
    el.className = 'model-pin'+(G.model&&G.model.id===m.id?' active':'');
    el.onclick = function(){ setModel(m); };
    el.innerHTML =
      '<div class="pin-ico"><img src="'+m.icon+'" alt="" onerror="this.style.display=\'none\'"></div>'+
      '<div style="flex:1;min-width:0"><div class="pin-name">'+esc(m.name)+'</div><div class="pin-prov">'+esc(m.provider)+'</div></div>'+
      '<div class="pin-check"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>';
    c.appendChild(el);
  });
}
function renderDd() {
  var dd = document.getElementById('model-dd'); dd.innerHTML = '';
  var cats = {};
  G.models.forEach(function(m){ if(!cats[m.provider])cats[m.provider]=[]; cats[m.provider].push(m); });

  var id=genId();
  G.chats.unshift({chatId:id,chatName:'新しいチャット',messages:[],createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});

function rmWelcome(){ ['welcome','welcome2'].forEach(function(id){var w=document.getElementById(id);if(w)w.remove();}); }

function appendMsg(role, content, ico) {
  rmWelcome();
  var a=document.getElementById('msgs');
  var row=document.createElement('div'); row.className='msg-row '+role;
  var avHtml='<div class="msg-av">';
  if(role==='user'){
    avHtml+=G.user&&G.user.profileImage?'<img src="'+G.user.profileImage+'" alt="">':(G.user?G.user.username.charAt(0).toUpperCase():'U');
  }else{
    var src=ico||(G.model?G.model.icon:'');
    avHtml+='<img src="'+src+'" alt="" onerror="this.style.display=\'none\'">';
  }
  avHtml+='</div>';

  row.innerHTML=avHtml+
    '<div class="msg-bub">'+
    (role==='ai'?md(content):esc(content).replace(/\n/g,'<br>'))+
    '<div class="msg-time">'+t+'</div></div>';

}
function addTyping() {
  var a=document.getElementById('msgs');
  var row=document.createElement('div'); row.id='typing'; row.className='msg-row ai typing-row';
  var src=G.model?G.model.icon:'';

    '<div class="msg-bub"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';

function rmTyping(){ var t=document.getElementById('typing'); if(t)t.remove(); }

// ================================================
// 送信
// ================================================
function doSend() {
  var inp=document.getElementById('msg-input');
  var txt=inp.value.trim(); if(!txt)return;
  if(!G.model){toast('モデルを選択してください');return;}
  inp.value=''; autoH(inp);
  document.getElementById('send-btn').disabled=true;
  appendMsg('user',txt);
  var chat=getChat();
  var hist=chat?chat.messages.slice():[];
  hist.push({role:'user',content:txt});
  addTyping();
  var mId=G.model.id, mIco=G.model.icon;
  google.script.run
    .withSuccessHandler(function(r){
      rmTyping(); document.getElementById('send-btn').disabled=false;
      if(r.ok){
        appendMsg('ai',r.content,mIco);
        if(!G.isTemp&&chat){
          chat.messages.push({role:'user',content:txt},{role:'assistant',content:r.content});
          chat.updatedAt=new Date().toISOString();
          if(chat.messages.length===2){
            chat.chatName=txt.slice(0,32)+(txt.length>32?'…':'');
            document.getElementById('tb-chat-name').textContent=chat.chatName;
          }
          saveLS(); renderHist();
          if(G.user&&G.token)
            google.script.run.saveChat(G.user.userId,G.token,chat.chatId,chat.chatName,JSON.stringify(chat.messages));
        }
      }else{toast('エラー: '+r.msg);}
    })
    .withFailureHandler(function(e){
      rmTyping(); document.getElementById('send-btn').disabled=false;
      toast('通信エラー: '+(e.message||''));
    })
    .sendMessage(mId,hist);
}
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();} }
function autoH(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; }

function renderHist() {
  var c=document.getElementById('hist'); c.innerHTML='';
  if(!G.chats.length){
    c.innerHTML='<div style="padding:10px 8px;text-align:center;font-size:12px;color:var(--c-muted)">履歴なし</div>';
    return;
  }
  G.chats.forEach(function(chat){
    var el=document.createElement('div');
    el.className='hist-item'+(chat.chatId===G.chatId?' active':'');
    el.dataset.id=chat.chatId;
    el.innerHTML=
      '<div class="hist-ico"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>'+
      '<div class="hist-name" id="hn-'+safeId(chat.chatId)+'">'+esc(chat.chatName)+'</div>'+
      '<div class="hist-acts">'+
        '<button class="ha-btn" onclick="renameChat(event,\''+safeId(chat.chatId)+'\')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'+
        '<button class="ha-btn ha-del" onclick="delChat(event,\''+safeId(chat.chatId)+'\')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>'+
      '</div>';
    el.onclick=function(e){ if(!e.target.closest('.hist-acts')&&!e.target.closest('input')) loadChat(chat.chatId); };
    c.appendChild(el);
  });
}
function loadChat(id) {
  var chat=G.chats.find(function(c){return c.chatId===id;}); if(!chat)return;
  G.chatId=id; G.isTemp=false;
  document.getElementById('tb-chat-name').textContent=chat.chatName;
  var a=document.getElementById('msgs'); a.innerHTML='';
  if(!chat.messages.length){
    var w=document.createElement('div'); w.id='welcome2'; w.className='welcome';
    w.innerHTML='<div style="font-size:36px;opacity:.3">💬</div><div style="font-size:13px;color:var(--c-muted)">まだメッセージはありません</div>';
    a.appendChild(w);
  }else{
    chat.messages.forEach(function(m){ appendMsg(m.role==='user'?'user':'ai',m.content); });
  }
  renderHist();
}
function renameChat(e, sid) {
  e.stopPropagation();
  var id = G.chats.find(function(c){return safeId(c.chatId)===sid;}); if(!id)return;
  var chat=id, el=document.getElementById('hn-'+sid), old=chat.chatName;
  el.innerHTML='<input type="text" value="'+escAttr(old)+'" maxlength="60" '+
    'onblur="finRename(\''+sid+'\')" '+
    'onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\'){this.value=\''+escAttr(old)+'\';this.blur();}">';
  var inp=el.querySelector('input'); inp.focus(); inp.select();
}
function finRename(sid) {
  var chat=G.chats.find(function(c){return safeId(c.chatId)===sid;}); if(!chat)return;
  var inp=document.querySelector('#hn-'+sid+' input');
  if(inp){ chat.chatName=inp.value.trim()||chat.chatName; if(G.chatId===chat.chatId)document.getElementById('tb-chat-name').textContent=chat.chatName; saveLS(); if(G.user&&G.token)google.script.run.saveChat(G.user.userId,G.token,chat.chatId,chat.chatName,JSON.stringify(chat.messages)); }
  renderHist();
}
function delChat(e, sid) {
  e.stopPropagation();
  var chat=G.chats.find(function(c){return safeId(c.chatId)===sid;}); if(!chat)return;
  G.chats=G.chats.filter(function(c){return c.chatId!==chat.chatId;});
  if(G.chatId===chat.chatId){G.chatId=null; saveLS(); newChat(); return;}
  saveLS(); renderHist();
  if(G.user&&G.token) google.script.run.deleteChat(G.user.userId,G.token,chat.chatId);
}
function loadSrvChats() {
  google.script.run.withSuccessHandler(function(r){if(r.ok){G.chats=r.chats;renderHist();saveLS();}}).loadChats(G.user.userId,G.token);
}

function applyAll(c) {
  var body=document.body;
  body.setAttribute('data-theme',c.theme||'dark');
  ['ac-violet','ac-ocean','ac-sunset','ac-forest','ac-rose','ac-gold','ac-indigo'].forEach(function(cl){body.classList.remove(cl);});
  body.classList.add(c.ac||'ac-violet');
  var bg=document.getElementById('bg');
  if(c.bg){bg.style.backgroundImage='url("'+c.bg+'")';body.classList.add('has-bg');}
  else{bg.style.backgroundImage='';body.classList.remove('has-bg');}
  var szMap={small:'12px',medium:'14px',large:'16px'};
  document.documentElement.style.setProperty('--fz',szMap[c.sz]||'14px');
  if(c.font&&c.font!=='Inter'){
    var enc=c.font.replace(/ /g,'+');
    var lid='dyn-font',ex=document.getElementById(lid);
    var href='https://fonts.googleapis.com/css2?family='+enc+':wght@400;500;600;700&display=swap';
    if(ex)ex.href=href;else{var lnk=document.createElement('link');lnk.id=lid;lnk.rel='stylesheet';lnk.href=href;document.head.appendChild(lnk);}
    document.documentElement.style.setProperty('--font','"'+c.font+'","Noto Sans JP",sans-serif');
  }else{
    document.documentElement.style.setProperty('--font','"Inter","Noto Sans JP",sans-serif');
  }
}
function saveSrvSet(){
  if(G.user&&G.token){var s=Object.assign({},G.cfg,{bg:null});google.script.run.saveSettings(G.user.userId,G.token,JSON.stringify(s));}
}

// ================================================
// ユーティリティ
// ================================================
function toast(s){ var t=document.getElementById('toast'); t.textContent=s; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000); }
function msg(id,s){ var el=document.getElementById(id); if(!el)return; el.textContent=s; el.style.display=s?'block':'none'; }
function v(id){ var el=document.getElementById(id); return el?el.value.trim():''; }
function esc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ if(!s)return''; return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function safeId(s){ if(!s)return''; return String(s).replace(/[^a-zA-Z0-9_-]/g,'_'); }

// マークダウン簡易レンダラー
function md(text){
  if(!text)return'';
  var t=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/```([\s\S]*?)```/g,function(m,c){return'<pre><code>'+c.trim()+'</code></pre>';});
  t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  t=t.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  t=t.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  t=t.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  t=t.replace(/^[-*] (.+)$/gm,'<li>$1</li>');
  t=t.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
  if(t.indexOf('<h')===-1&&t.indexOf('<ul')===-1&&t.indexOf('<pre')===-1){
    t='<p>'+t.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</p>';
  }else{t=t.replace(/\n(?!<)/g,'<br>');}
  return t;
}
